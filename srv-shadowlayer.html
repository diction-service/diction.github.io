<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shadow.layer — Project UNKNOWN</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--bg2:#131316;--bg3:#1a1a1e;--bg4:#222228;
  --border:#2a2a32;--border2:#363640;
  --text:#e8e8f0;--text2:#8888a0;--text3:#555568;
  --purple:#7f77dd;--purple-dim:#534ab7;--purple-bg:#1e1a3a;--purple-glow:#7f77dd33;
  --teal:#1d9e75;--teal-bg:#0a1f18;
  --red:#e24b4a;--red-bg:#1f0d0d;
  --amber:#ef9f27;--amber-bg:#1f1708;
  --font-sans:'Noto Sans JP',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:2px;background:var(--bg)}
.s-logo{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:8px}
.s-logo-mark{width:30px;height:30px;border-radius:8px;border:1px solid var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;color:var(--red);box-shadow:0 0 10px #e24b4a33}
.s-logo-text{font-family:var(--font-mono);font-size:13px;font-weight:500;letter-spacing:1px}
.nav{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;user-select:none}
.nav:hover{background:var(--bg3);color:var(--text)}
.nav.active{background:var(--purple-bg);color:var(--purple);font-weight:500}
.nav-ic{width:16px;text-align:center;font-size:14px;font-family:var(--font-mono);flex-shrink:0}
.unread-num{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto;background:var(--red-bg);color:var(--red);border:1px solid var(--red);font-family:var(--font-mono);display:none}
.unread-num.show{display:block}
.note-btn{margin-top:auto;margin-bottom:4px;padding:11px;background:var(--purple-dim);color:#fff;border:none;border-radius:var(--rl);cursor:pointer;font-size:13px;font-weight:500;letter-spacing:.5px;transition:background .2s}
.note-btn:hover{background:var(--purple)}
.user-row{display:flex;align-items:center;gap:8px;padding:10px 8px 0;margin-top:4px;border-top:1px solid var(--border)}
.u-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--purple-bg);border:1px solid var(--purple-dim);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--purple);font-family:var(--font-mono);overflow:hidden}
.u-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.u-name{font-size:12px;font-weight:500;color:var(--text)}
.u-handle{font-size:11px;color:var(--text3);font-family:var(--font-mono)}
.logout-btn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font-mono);background:none;border:none}
.logout-btn:hover{color:var(--red)}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden;min-width:0;border-right:1px solid var(--border)}
.panel.active{display:flex}
.panel-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg)}
.panel-hd h2{font-size:14px;font-weight:500;font-family:var(--font-mono);letter-spacing:1px}
.live-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--red-bg);color:var(--red);border:1px solid var(--red);font-family:var(--font-mono);animation:pulse-b 2s infinite}
@keyframes pulse-b{0%,100%{opacity:1}50%{opacity:.6}}
.tl-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tl-tab{flex:1;padding:10px 4px;font-size:12px;text-align:center;cursor:pointer;color:var(--text3);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tl-tab:hover{color:var(--text2)}
.tl-tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.scroll-area{overflow-y:auto;flex:1}
.compose-wrap{display:none;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.compose-wrap.show{display:block}
.compose-inner{background:var(--bg3);border-radius:var(--rl);padding:14px;border:1px solid var(--border2)}
.compose-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.compose-ta{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);resize:none;outline:none;min-height:80px;line-height:1.6}
.compose-ta::placeholder{color:var(--text3)}
.compose-ft{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px;margin-top:6px}
.cw-toggle{font-size:12px;color:var(--text3);cursor:pointer;border:1px solid var(--border);border-radius:4px;padding:3px 8px;background:none}
.cw-inp{width:100%;border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);margin-bottom:8px;display:none;font-family:var(--font-mono);outline:none}
.cw-inp.show{display:block}
.cc{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
.post-btn{padding:8px 18px;background:var(--purple-dim);color:#fff;border:none;border-radius:var(--r);font-size:13px;cursor:pointer;font-weight:500;transition:background .2s}
.post-btn:hover{background:var(--purple)}
.post{padding:14px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.post:hover{background:var(--bg2)}
.post.alert-post{border-left:2px solid var(--red)}
.post-top{display:flex;gap:10px}
.av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-family:var(--font-mono);overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av.av1{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-dim)}
.av.av2{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal)}
.av.av3{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.av.av4{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.av.av-you{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-dim)}
.p-main{flex:1;min-width:0}
.p-hd{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.p-name{font-size:13px;font-weight:500}
.p-handle{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
.p-time{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--font-mono)}
.p-body{font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.p-body.cipher{font-family:var(--font-mono);font-size:12px;letter-spacing:1.5px;color:var(--purple);text-shadow:0 0 8px var(--purple-glow)}
.pbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:4px;margin-left:6px;font-family:var(--font-mono);vertical-align:middle}
.pb-c{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-dim)}
.pb-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.reacts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.react{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;background:var(--bg3);color:var(--text2);transition:all .15s}
.react:hover,.react.on{background:var(--purple-bg);border-color:var(--purple-dim);color:var(--purple)}
.acts{display:flex;gap:16px;margin-top:8px}
.act{font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font-mono);transition:color .15s}
.act:hover{color:var(--text)}
.act.liked{color:var(--red)}
.reply-in{margin-left:48px;border-left:2px solid var(--border);padding-left:12px;margin-top:4px}
.reply-in .post{padding:10px 0;border-bottom:none;background:transparent!important}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;cursor:pointer;transition:background .1s;position:relative}
.notif-item:hover{background:var(--bg2)}
.notif-item.unread::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--purple);box-shadow:0 0 6px var(--purple)}
.notif-body-text{font-size:13px;line-height:1.5}
.notif-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--font-mono)}
.notif-preview{font-size:12px;color:var(--text2);margin-top:4px;padding:6px 10px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);font-family:var(--font-mono)}
.ch-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ch-list-area{overflow-y:auto;flex:1;padding:10px}
.ch-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:var(--bg3);transition:all .15s;margin-bottom:6px}
.ch-item:hover,.ch-item.active{border-color:var(--purple-dim);background:var(--purple-bg)}
.ch-hash{font-family:var(--font-mono);font-size:16px;color:var(--purple);flex-shrink:0}
.ch-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ch-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{display:flex;gap:10px;align-items:flex-start}
.msg-av-sm{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-mono);overflow:hidden}
.msg-av-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-content{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-name{font-size:12px;font-weight:500}
.msg-time{font-size:10px;color:var(--text3);font-family:var(--font-mono)}
.msg-body{font-size:13px;line-height:1.6}
.ch-input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.ch-inp{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.ch-inp:focus{border-color:var(--purple-dim)}
.ch-inp::placeholder{color:var(--text3)}
.ch-send{padding:9px 16px;background:var(--purple-dim);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;transition:background .2s}
.ch-send:hover{background:var(--purple)}
.right-col{width:260px;flex-shrink:0;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;background:var(--bg)}
.w-card{background:var(--bg2);border-radius:var(--rl);padding:12px;border:1px solid var(--border)}
.w-title{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;font-family:var(--font-mono)}
.empty{padding:40px 16px;text-align:center;color:var(--text3);font-family:var(--font-mono);font-size:13px;line-height:1.8}
.empty-ic{font-size:32px;margin-bottom:12px;opacity:.4}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg4);color:var(--text);padding:10px 18px;border-radius:var(--rl);font-size:12px;opacity:0;transition:all .3s;border:1px solid var(--border2);font-family:var(--font-mono);z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.access-denied-msg{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
.access-denied-msg.show{opacity:1}
.ad-inner{background:#1f0d0d;border:1px solid var(--red);border-radius:var(--rl);padding:20px 32px;display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:16px;color:var(--red)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@media(max-width:768px){
  .sidebar{display:none}
  .right-col{display:none!important}
  .mob-nav{display:flex!important}
  .panel{border-right:none}
  .scroll-area{padding-bottom:70px}
  .panel#panel-channels{flex-direction:column}
  .ch-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:160px}
}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="s-logo">
    <div class="s-logo-mark">S</div>
    <span class="s-logo-text">shadow.layer</span>
  </div>
  <div class="nav active" data-panel="timeline"><span class="nav-ic">≡</span>タイムライン</div>
  <div class="nav" data-panel="notif"><span class="nav-ic">♡</span>通知<span class="unread-num" id="notif-badge">0</span></div>
  <div class="nav" data-panel="channels"><span class="nav-ic">■</span>チャンネル</div>
  <div class="nav" data-panel="search"><span class="nav-ic">○</span>検索</div>
  <button class="note-btn" onclick="openCompose()">ノート</button>
  <div class="user-row">
    <div class="u-av" id="user-av"></div>
    <div style="min-width:0"><div class="u-name" id="user-name">…</div><div class="u-handle" id="user-handle"></div></div>
    <button class="logout-btn" onclick="logout()">⏻</button>
  </div>
</div>
<div class="panel active" id="panel-timeline">
  <div class="panel-hd"><h2>shadow.layer</h2><span class="live-badge">LIVE</span></div>
  <div class="tl-tabs">
    <button class="tl-tab active" onclick="switchTab(this)">ホーム</button>
    <button class="tl-tab" onclick="switchTab(this)">ローカル</button>
    <button class="tl-tab" onclick="switchTab(this)">ソーシャル</button>
    <button class="tl-tab" onclick="switchTab(this)">グローバル</button>
  </div>
  <div class="compose-wrap" id="compose-area">
    <div class="compose-inner">
      <div class="compose-hd">
        <div class="av av-you" id="compose-av" style="width:34px;height:34px;font-size:12px"></div>
        <span style="font-size:13px;color:var(--text3);font-family:var(--font-mono)">今、何してる？</span>
        <button style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px" onclick="closeCompose()">✕</button>
      </div>
      <input class="cw-inp" id="cw-field" placeholder="コンテンツの警告..." />
      <textarea class="compose-ta" id="compose-text" placeholder="shadow.layer に投稿する..." rows="3"
        oninput="document.getElementById('cc').textContent=500-this.value.length"></textarea>
      <div class="compose-ft">
        <button class="cw-toggle" onclick="toggleCW()">CW</button>
        <span class="cc" id="cc">500</span>
        <button class="post-btn" onclick="submitPost()">ノートする</button>
      </div>
    </div>
  </div>
  <div class="scroll-area" id="tl-feed"></div>
</div>
<div class="panel" id="panel-notif">
  <div class="panel-hd"><h2>通知</h2></div>
  <div class="tl-tabs">
    <button class="tl-tab active" onclick="filterNotifs('all',this)">すべて</button>
    <button class="tl-tab" onclick="filterNotifs('reply',this)">リプライ</button>
    <button class="tl-tab" onclick="filterNotifs('like',this)">いいね</button>
    <button class="tl-tab" onclick="filterNotifs('system',this)">システム</button>
  </div>
  <div class="scroll-area" id="notif-feed"></div>
</div>
<div class="panel" id="panel-channels" style="flex-direction:row">
  <div class="ch-sidebar">
    <div class="panel-hd"><h2>チャンネル</h2></div>
    <div class="ch-list-area" id="ch-list"></div>
  </div>
  <div class="ch-main" id="ch-main">
    <div class="empty"><div class="empty-ic">■</div>チャンネルを選択してください</div>
  </div>
</div>
<div class="panel" id="panel-search">
  <div class="panel-hd"><h2>検索</h2></div>
  <div style="padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
    <div style="display:flex;gap:8px;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);padding:10px 14px">
      <span style="color:var(--text3);font-family:var(--font-mono)">○</span>
      <input id="search-inp" placeholder="投稿・キーワードを検索..." oninput="doSearch(this.value)" autocomplete="off"
        style="flex:1;border:none;background:transparent;color:var(--text);font-size:13px;outline:none;font-family:var(--font-mono)"/>
    </div>
  </div>
  <div class="scroll-area" id="search-out"><div class="empty"><div class="empty-ic">○</div>キーワードを入力して検索</div></div>
</div>
<div class="right-col" id="right-col">
  <div class="w-card">
    <div class="w-title">shadow.layer について</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8;font-family:var(--font-mono)">完全非公開サーバー。<br>暗号を解いた者のみが入室を許可される。</div>
  </div>
  <div class="w-card">
    <div class="w-title">謎解きヒント</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8;font-family:var(--font-mono)">
      <span style="color:var(--purple)">// HINT_001</span><br>「暗号」と投稿すると何かが...<br><br>
      <span style="color:var(--purple)">// HINT_002</span><br>shadow.layerへの鍵は暗号の中
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<div class="mob-nav" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;justify-content:space-around;padding:6px 0 10px">
  <button onclick="mobNav('timeline')" style="background:none;border:none;color:var(--text2);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:var(--font-mono);padding:4px 8px"><span style="font-size:18px">≡</span>TL</button>
  <button onclick="mobNav('notif')" style="background:none;border:none;color:var(--text2);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:var(--font-mono);padding:4px 8px"><span style="font-size:18px">♡</span>通知</button>
  <button onclick="openCompose()" style="background:var(--purple-dim);border:none;color:#fff;font-size:16px;cursor:pointer;padding:6px 16px;border-radius:20px;margin:0 4px">+</button>
  <button onclick="mobNav('channels')" style="background:none;border:none;color:var(--text2);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:var(--font-mono);padding:4px 8px"><span style="font-size:18px">■</span>CH</button>
  <button onclick="mobNav('search')" style="background:none;border:none;color:var(--text2);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:var(--font-mono);padding:4px 8px"><span style="font-size:18px">○</span>検索</button>
</div>
<script>
// ============================================================
// ★★★ ARG シナリオ設定 — ここだけ編集してください ★★★
// ============================================================

// 【返信トリガー】 word を投稿すると actor_idx のキャラが reply を返す
// actor_idx: 0=謎の存在 1=調査員A 2=システム 3=緊急放送
const TRIGGERS = [
  { word: '暗号',        reply: '...お前も気づいたか。ROT3を試せ。',                                 actor_idx: 0 },
  { word: 'HELLO WORLD', reply: '正しい。鍵の第二層へ進め。次の座標を確認せよ：35.6762, 139.6503',  actor_idx: 0 },
  { word: 'layer2',      reply: '正しい。次の扉はさらに深い場所にある。',                            actor_idx: 2 },
  { word: 'shadow',      reply: '...見つけたか。だがここに入るには、まだ足りないものがある。',        actor_idx: 0 },
  { word: 'void',        reply: '...存在しないはずのものを見た。それは正しい疑問だ。',                actor_idx: 0 },
  // 追加例: { word: '新ワード', reply: '返信内容', actor_idx: 0 },
];

// 【案内投稿】 ログイン時のタイムラインに表示されるARGキャラの投稿
// cipher:true=暗号スタイル  is_alert:true=緊急スタイル
const SCENARIO_POSTS = [
  { id:'sp_001', actor_idx:0, body:'KHOOR ZRUOG\n\n最初の鍵を見つけよ。',                                              cipher:true,  is_alert:false },
  { id:'sp_002', actor_idx:2, body:'⚠ システム警告\n01001100 01000001 01011001 01000101 01010010 00110010',             cipher:true,  is_alert:false },
  { id:'sp_003', actor_idx:3, body:'【緊急】第二フェーズが開始されました。\n次のメッセージを待て。時間は限られている。', cipher:false, is_alert:true  },
  // 追加例: { id:'sp_004', actor_idx:0, body:'投稿内容', cipher:false, is_alert:false },
];

// 【チャンネルBotトリガー】 ch チャンネルで word を投稿すると返信
const CH_TRIGGERS = [
  { ch:'cipher',   word:'ROT3',  reply:'正しい。次のシフト数は21だ。',                actor_idx:0 },
  { ch:'cipher',   word:'バイナリ', reply:'01100111 01101111 01101111 01100100', actor_idx:2 },
  // 追加例: { ch:'general', word:'キーワード', reply:'返信', actor_idx:0 },
];

// ============================================================
// 以下は編集不要
// ============================================================
const ACTORS = [
  {name:'謎の存在',handle:'@unknown@shadow.layer',cls:'av1',t:'?'},
  {name:'調査員A', handle:'@agent_a@shadow.layer', cls:'av2',t:'A'},
  {name:'システム',handle:'@sys@shadow.layer',     cls:'av3',t:'S'},
  {name:'緊急放送',handle:'@broadcast@shadow.layer',cls:'av4',t:'!'},
];
const CHANNELS = [
  {id:'cipher',  name:'cipher', desc:'暗号解読専用', pinned:true },
  {id:'theories',name:'考察',   desc:'ARG全体の考察',pinned:false},
];

let me=null,myMeta=null,posts=[],allNotifs=[],currentChannelId=null,currentNotifFilter='all',cwVisible=false;

function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}
function getPosts(){return lsGet('sl_posts')||[];}
function savePosts(p){lsSet('sl_posts',p);}
function getNotifs(){return lsGet('sl_notifs')||[];}
function saveNotifs(n){lsSet('sl_notifs',n);}
function getChMsgs(id){return lsGet('sl_ch_'+id)||[];}
function saveChMsgs(id,msgs){lsSet('sl_ch_'+id,msgs);}

function init(){
  const xUser=localStorage.getItem('x_user');
  if(!xUser){location.href='./index.html';return;}
  const parsed=JSON.parse(xUser);
  me={id:parsed.id};
  myMeta={full_name:parsed.name,user_name:parsed.username,avatar_url:parsed.avatar};
  renderUser();
  const saved=getPosts();
  const savedIds=new Set(saved.map(p=>String(p.id)));
  let changed=false;
  for(const sp of SCENARIO_POSTS){
    if(!savedIds.has(String(sp.id))){
      saved.unshift({...sp,likes:0,rp:0,reacts:[],created_at:new Date(Date.now()-86400000*7).toISOString(),_replies:[]});
      changed=true;
    }
  }
  if(changed)savePosts(saved);
  posts=getPosts();
  allNotifs=getNotifs();
  renderFeed();
  renderChannelList();
  renderNotifs('all');
  updateNotifBadge();
}

function renderUser(){
  const av=document.getElementById('user-av');
  const cav=document.getElementById('compose-av');
  const avatar=myMeta.avatar_url||'';
  const name=myMeta.full_name||myMeta.user_name||'?';
  const handle='@'+(myMeta.user_name||'you')+'@x.com';
  if(avatar){av.innerHTML=`<img src="${avatar}" alt="">`;cav.innerHTML=`<img src="${avatar}" alt="">`;}
  else{av.textContent=name[0];cav.textContent=name[0];}
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-handle').textContent=handle;
}

function logout(){localStorage.removeItem('x_user');location.href='./index.html';}

document.querySelectorAll('.nav[data-panel]').forEach(nav=>{
  nav.addEventListener('click',()=>{
    const panel=nav.dataset.panel;
    document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));
    nav.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+panel).classList.add('active');
    document.getElementById('right-col').style.display=panel==='timeline'?'flex':'none';
    if(panel==='notif')markNotifsRead();
  });
});

function mobNav(panel){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+panel).classList.add('active');
  if(panel==='notif')markNotifsRead();
}

function switchTab(el){
  el.parentElement.querySelectorAll('.tl-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const restricted=['ローカル','ソーシャル','グローバル'];
  if(restricted.includes(el.textContent.trim())){
    showAccessDenied();
    setTimeout(()=>{el.parentElement.querySelectorAll('.tl-tab').forEach(t=>t.classList.remove('active'));el.parentElement.querySelector('.tl-tab').classList.add('active');},2000);
  }
}

function showAccessDenied(){
  const feed=document.getElementById('tl-feed');
  feed.style.animation='none';feed.offsetHeight;feed.style.animation='shake 0.4s ease';
  const msg=document.createElement('div');
  msg.className='access-denied-msg';
  msg.innerHTML='<div class="ad-inner"><span>⚠</span><span style="margin-left:8px">アクセスは不可能です</span></div>';
  document.body.appendChild(msg);
  setTimeout(()=>msg.classList.add('show'),10);
  setTimeout(()=>{msg.classList.remove('show');setTimeout(()=>msg.remove(),400);},2000);
}

function openCompose(){document.getElementById('compose-area').classList.add('show');document.getElementById('compose-text').focus();}
function closeCompose(){document.getElementById('compose-area').classList.remove('show');}
function toggleCW(){cwVisible=!cwVisible;document.getElementById('cw-field').classList.toggle('show',cwVisible);}

function submitPost(){
  const cwText=document.getElementById('cw-field').value.trim();
  const rawText=document.getElementById('compose-text').value.trim();
  if(!rawText)return;
  const text=cwText?'[CW: '+cwText+']\n'+rawText:rawText;
  const name=myMeta.full_name||myMeta.user_name||'?';
  const handle='@'+(myMeta.user_name||'you')+'@x.com';
  const avatar=myMeta.avatar_url||null;
  const newPost={id:Date.now(),actor_idx:-1,user_id:me.id,user_name:name,user_handle:handle,user_avatar:avatar,body:text,cipher:false,is_alert:false,likes:0,rp:0,reacts:['👍'],created_at:new Date().toISOString(),_replies:[]};
  posts.push(newPost);
  savePosts(posts.map(strip));
  const bodyLow=text.toLowerCase();
  let fired=false;
  TRIGGERS.forEach(t=>{
    if(!bodyLow.includes(t.word.toLowerCase()))return;
    fired=true;
    const a=ACTORS[t.actor_idx]||ACTORS[0];
    const rep={id:Date.now()+Math.random(),actor_idx:t.actor_idx,is_bot:true,body:t.reply,cipher:false,created_at:new Date().toISOString()};
    newPost._replies.push(rep);
    const saved=getPosts();const idx=saved.findIndex(p=>String(p.id)===String(newPost.id));
    if(idx>=0){saved[idx]._replies=newPost._replies.map(stripReply);savePosts(saved);}
    addNotif({type:'reply',actor_idx:t.actor_idx,body:a.name+'がリプライ',sub:'「'+t.reply.slice(0,20)+'...」'});
    showToast(a.name+' からリプライが届いた');
  });
  document.getElementById('compose-text').value='';
  document.getElementById('cw-field').value='';
  document.getElementById('cc').textContent='500';
  cwVisible=false;document.getElementById('cw-field').classList.remove('show');
  closeCompose();renderFeed();
  if(!fired)showToast('投稿しました');
}

function strip(p){return{id:p.id,actor_idx:p.actor_idx,user_id:p.user_id,user_name:p.user_name,user_handle:p.user_handle,user_avatar:p.user_avatar,body:p.body,cipher:p.cipher,is_alert:p.is_alert,likes:p.likes,rp:p.rp,reacts:p.reacts,created_at:p.created_at,_replies:(p._replies||[]).map(stripReply)};}
function stripReply(r){return{id:r.id,actor_idx:r.actor_idx,user_id:r.user_id,user_name:r.user_name,user_handle:r.user_handle,user_avatar:r.user_avatar,body:r.body,cipher:r.cipher,is_bot:r.is_bot,created_at:r.created_at};}

function renderFeed(){
  const feed=document.getElementById('tl-feed');
  if(!posts.length){feed.innerHTML='<div class="empty"><div class="empty-ic">≡</div>投稿がありません</div>';return;}
  feed.innerHTML=posts.slice().reverse().map(renderPost).join('');
}

function renderPost(p){
  const isArg=p.actor_idx>=0;
  const a=isArg?ACTORS[p.actor_idx]||ACTORS[0]:null;
  const name=isArg?a.name:(p.user_name||'?');
  const handle=isArg?a.handle:(p.user_handle||'@?');
  const avCls=isArg?a.cls:'av-you';
  const avT=isArg?a.t:(name[0]||'?');
  const avHtml=(p.user_avatar&&!isArg)?`<img src="${p.user_avatar}" alt="">`:esc(avT);
  const reps=p._replies||[];
  return `<div class="post${p.is_alert?' alert-post':''}">
    <div class="post-top">
      <div class="av ${avCls}">${avHtml}</div>
      <div class="p-main">
        <div class="p-hd">
          <span class="p-name">${esc(name)}</span><span class="p-handle">${esc(handle)}</span>
          ${p.cipher?'<span class="pbadge pb-c">暗号</span>':''}
          ${p.is_alert?'<span class="pbadge pb-a">緊急</span>':''}
          <span class="p-time">${relTime(p.created_at)}</span>
        </div>
        <div class="p-body${p.cipher?' cipher':''}">${esc(p.body)}</div>
        <div class="reacts">${(p.reacts||[]).map(r=>`<span class="react" onclick="this.classList.toggle('on')">${r}</span>`).join('')}</div>
        <div class="acts">
          <span class="act" onclick="replyToPost('${p.id}')">⟨ ${reps.length}</span>
          <span class="act" onclick="renote('${p.id}',this)">↻ ${p.rp||0}</span>
          <span class="act${p._liked?' liked':''}" onclick="toggleLike('${p.id}',this)">♡ ${p.likes}</span>
        </div>
      </div>
    </div>
    ${reps.map(r=>{
      const ra=r.actor_idx>=0?ACTORS[r.actor_idx]||ACTORS[0]:{name:r.user_name||'?',handle:r.user_handle||'',cls:'av3',t:'?'};
      const ravHtml=(r.user_avatar&&r.actor_idx<0)?`<img src="${r.user_avatar}" alt="">`:esc(ra.t);
      return `<div class="reply-in"><div class="post"><div class="post-top">
        <div class="av ${ra.cls}" style="width:28px;height:28px;font-size:12px">${ravHtml}</div>
        <div class="p-main">
          <div class="p-hd"><span class="p-name">${esc(ra.name)}</span><span class="p-handle">${esc(ra.handle)}</span><span class="p-time">${relTime(r.created_at)}</span></div>
          <div class="p-body${r.cipher?' cipher':''}">${esc(r.body)}</div>
        </div>
      </div></div></div>`;
    }).join('')}
  </div>`;
}

function replyToPost(id){
  const p=posts.find(x=>String(x.id)===String(id));if(!p)return;
  const isArg=p.actor_idx>=0;
  const mention=isArg?'@'+(ACTORS[p.actor_idx]||ACTORS[0]).handle.split('@')[1]:'@'+(p.user_handle||'').split('@')[1]||'@user';
  openCompose();document.getElementById('compose-text').value=mention+' ';
}

function toggleLike(id,el){
  const p=posts.find(x=>String(x.id)===String(id));if(!p)return;
  if(p._liked){p.likes=Math.max(0,p.likes-1);p._liked=false;el.classList.remove('liked');}
  else{p.likes++;p._liked=true;el.classList.add('liked');}
  el.innerHTML='♡ '+p.likes;savePosts(posts.map(strip));
}

function renote(id,el){
  const p=posts.find(x=>String(x.id)===String(id));if(!p)return;
  const isArg=p.actor_idx>=0;
  const a=isArg?ACTORS[p.actor_idx]:{handle:'@'+(p.user_name||'?')};
  openCompose();
  document.getElementById('compose-text').value='RN: @'+(a.handle.split('@')[1]||a.name)+'\n「'+p.body.slice(0,60)+(p.body.length>60?'...':'')+'」\n';
  p.rp=(p.rp||0)+1;el.textContent='↻ '+p.rp;savePosts(posts.map(strip));
}

function renderChannelList(){
  const el=document.getElementById('ch-list');
  el.innerHTML=CHANNELS.map(ch=>`
    <div class="ch-item${currentChannelId===ch.id?' active':''}" onclick="openChannel('${ch.id}')">
      <div class="ch-hash">#</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${esc(ch.name)}</div>
        <div style="font-size:11px;color:var(--text2)">${esc(ch.desc)}</div>
      </div>
      ${ch.pinned?'<span style="font-size:10px;color:var(--amber);font-family:var(--font-mono)">PIN</span>':''}
    </div>`).join('');
}

function openChannel(id){
  currentChannelId=id;renderChannelList();
  const ch=CHANNELS.find(c=>c.id===id);
  const msgs=getChMsgs(id);
  const main=document.getElementById('ch-main');
  main.innerHTML=`
    <div class="panel-hd" style="border-bottom:1px solid var(--border)">
      <h2># ${esc(ch?.name||id)}</h2>
      <span style="font-size:12px;color:var(--text3);font-family:var(--font-mono)">${esc(ch?.desc||'')}</span>
    </div>
    <div class="ch-msgs scroll-area" id="ch-msgs-${id}">
      ${msgs.length===0?'<div class="empty"><div class="empty-ic">#</div>まだメッセージがありません</div>':msgs.map(renderChMsg).join('')}
    </div>
    <div class="ch-input-wrap">
      <input class="ch-inp" id="ch-inp-${id}" placeholder="# ${esc(ch?.name||id)} へ投稿..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${id}')}"/>
      <button class="ch-send" onclick="sendMsg('${id}')">送信</button>
    </div>`;
  const msgsEl=document.getElementById('ch-msgs-'+id);
  if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
}

function renderChMsg(m){
  const isBot=m.actor_idx!=null&&m.actor_idx>=0;
  const a=isBot?ACTORS[m.actor_idx]||ACTORS[0]:null;
  const avHtml=isBot?esc(a.t):(m.user_avatar?`<img src="${m.user_avatar}" alt="">`:esc((m.user_name||'?')[0]));
  const avCls=isBot?a.cls:'';
  const t=new Date(m.created_at).toLocaleTimeString('ja',{hour:'2-digit',minute:'2-digit'});
  return `<div class="msg-bubble">
    <div class="msg-av-sm ${avCls}">${avHtml}</div>
    <div class="msg-content">
      <div class="msg-meta"><span class="msg-name">${esc(isBot?a.name:m.user_name)}</span><span class="msg-time">${t}</span></div>
      <div class="msg-body">${esc(m.body)}</div>
    </div>
  </div>`;
}

function sendMsg(id){
  const inp=document.getElementById('ch-inp-'+id);if(!inp)return;
  const body=inp.value.trim();if(!body)return;
  inp.value='';
  const name=myMeta.full_name||myMeta.user_name||'?';
  const handle='@'+(myMeta.user_name||'you');
  const avatar=myMeta.avatar_url||null;
  const msg={id:Date.now(),user_name:name,user_handle:handle,user_avatar:avatar,body,created_at:new Date().toISOString(),actor_idx:-1};
  const msgs=getChMsgs(id);msgs.push(msg);saveChMsgs(id,msgs);
  const msgsEl=document.getElementById('ch-msgs-'+id);
  if(msgsEl){
    const empty=msgsEl.querySelector('.empty');if(empty)empty.remove();
    const div=document.createElement('div');div.innerHTML=renderChMsg(msg);
    msgsEl.appendChild(div.firstElementChild);msgsEl.scrollTop=msgsEl.scrollHeight;
  }
  const bodyLow=body.toLowerCase();
  CH_TRIGGERS.forEach(t=>{
    if(t.ch!==id||!bodyLow.includes(t.word.toLowerCase()))return;
    const a=ACTORS[t.actor_idx]||ACTORS[0];
    setTimeout(()=>{
      const botMsg={id:Date.now()+Math.random(),user_name:a.name,user_handle:a.handle,user_avatar:null,body:t.reply,created_at:new Date().toISOString(),actor_idx:t.actor_idx};
      const msgs2=getChMsgs(id);msgs2.push(botMsg);saveChMsgs(id,msgs2);
      const el2=document.getElementById('ch-msgs-'+id);
      if(el2){const div2=document.createElement('div');div2.innerHTML=renderChMsg(botMsg);el2.appendChild(div2.firstElementChild);el2.scrollTop=el2.scrollHeight;}
      showToast(a.name+' からメッセージが届いた');
    },1000);
  });
}

function addNotif(n){
  n.id=Date.now();n.is_read=false;n.created_at=new Date().toISOString();
  allNotifs.unshift(n);if(allNotifs.length>50)allNotifs.length=50;
  saveNotifs(allNotifs);updateNotifBadge();renderNotifs(currentNotifFilter);
}

function renderNotifs(filter){
  currentNotifFilter=filter;
  const el=document.getElementById('notif-feed');
  const list=filter==='all'?allNotifs:allNotifs.filter(n=>n.type===filter);
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ic">♡</div>通知がありません</div>';return;}
  el.innerHTML=list.map(n=>{
    const a=n.actor_idx!=null?ACTORS[n.actor_idx]||ACTORS[0]:{cls:'av3',t:'S'};
    return `<div class="notif-item${!n.is_read?' unread':''}">
      <div class="av ${a.cls}" style="width:38px;height:38px;flex-shrink:0">${esc(a.t)}</div>
      <div style="flex:1;min-width:0;margin-left:12px">
        <div class="notif-body-text">${esc(n.body)}</div>
        ${n.sub?`<div class="notif-preview">${esc(n.sub)}</div>`:''}
        <div class="notif-meta">${relTime(n.created_at)}</div>
      </div>
    </div>`;
  }).join('');
}

function filterNotifs(filter,el){
  el.parentElement.querySelectorAll('.tl-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderNotifs(filter);
}

function updateNotifBadge(){
  const cnt=allNotifs.filter(n=>!n.is_read).length;
  const badge=document.getElementById('notif-badge');
  if(cnt>0){badge.textContent=cnt;badge.classList.add('show');}
  else{badge.textContent='';badge.classList.remove('show');}
}

function markNotifsRead(){
  allNotifs.forEach(n=>n.is_read=true);saveNotifs(allNotifs);
  updateNotifBadge();renderNotifs(currentNotifFilter);
}

function doSearch(q){
  const el=document.getElementById('search-out');
  if(!q){el.innerHTML='<div class="empty"><div class="empty-ic">○</div>キーワードを入力して検索</div>';return;}
  const ql=q.toLowerCase();
  const matched=posts.filter(p=>p.body.toLowerCase().includes(ql));
  if(!matched.length){el.innerHTML='<div class="empty">「'+esc(q)+'」の結果が見つかりませんでした</div>';return;}
  el.innerHTML=matched.slice().reverse().map(renderPost).join('');
}

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function relTime(ts){
  if(!ts)return 'たった今';
  const d=Date.now()-new Date(ts).getTime();
  if(d<60000)return 'たった今';
  if(d<3600000)return Math.floor(d/60000)+'分前';
  if(d<86400000)return Math.floor(d/3600000)+'時間前';
  return Math.floor(d/86400000)+'日前';
}

let tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);
}

init();
</script>
</body>
